name: Deploy Portfolio Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    container: python:3.9.6-slim
    steps:
      - name: Install operating-system dependencies
        run: |
          apt-get update
          apt-get install --yes --no-install-recommends git
          rm -rf /var/lib/apt/lists/*

      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm governed Python version
        run: |
          python --version
          python -c "import sys; print(sys.version.split()[0]); assert sys.version.split()[0] == '3.9.6'"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install public verification dependencies
        run: python -m pip install -r requirements-verification.txt

      - name: Confirm governed dependency versions
        run: |
          python -c "import numpy as np; print(np.__version__); assert np.__version__ == '2.0.2'"
          python -c "import onnxruntime as ort; print(ort.__version__); assert ort.__version__ == '1.19.2'"

      - name: Run clean-clone tests
        run: python -m pytest -q

      - name: Verify public clone artifacts
        run: python scripts/verify_public_clone.py

      - name: Verify governed portfolio bundle
        run: python scripts/build_portfolio_evidence_bundle.py --check

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload portfolio artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
